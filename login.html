<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Login | RecMeet</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: var(--bg-alt); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-card { background: white; padding: 60px; border-radius: var(--radius-lg); text-align: center; max-width: 500px; border: 1px solid var(--border); box-shadow: var(--shadow); }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo" style="margin-bottom: 30px;">Rec<span>Meet</span></div>
        <i data-lucide="lock" style="width: 48px; height: 48px; color: var(--primary); margin-bottom: 20px;"></i>
        <h2>Portal Under Construction</h2>
        <p style="color: var(--text-muted); margin: 20px 0 30px;">We are currently migrating our teacher portal to a secure static architecture. Access will be restored shortly.</p>
        <a href="index.html" class="btn btn-primary" style="width: 100%;">Return to Home</a>
        
        <div style="margin-top: 40px; border-top: 1px solid var(--border); padding-top: 20px; font-size: 14px; color: var(--text-muted);">
            Need urgent access? <a href="mailto:shivam15goswami@gmail.com" style="color: var(--primary);">Contact Shivam</a>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
